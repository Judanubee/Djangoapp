{% extends "inicio/encabezado.html" %}

{% 
    {% block titulo %} EDITAR {% endblock titulo %}
%}

{% block encabezado %}
				<!--Encabezdo -->
			<div class="page-header">
				<div class="page-title">
					<h3>Editar Comentario
                    <small>Modifique los datos del comentario</small></h3>
				  </h3>
				</div>
				
			</div>
			<!-- /Encabezado-->
{% endblock encabezado %}

{% block contenido %}
			<!-- Formulario -->
			<form class="form-horizontal" action="" method="POST" role="form">
				{% csrf_token %}
	            <div class="panel panel-default">
	                <div class="panel-body">

				        <div class="form-group">
				            <label class="col-sm-2 control-label text-right">Nombre:</label>
				            <div class="col-sm-10">
				            	<input type="text" class="form-control" name="usuario">
				            </div>
				        </div>
                        <div class= "form-group">
				            <label class="col-sm-2 control-label text-right">Mensaje:</label>
                            <div class="col-sm-10">
                                <textarea cols="100" rows="10" name="mensaje"></textarea>
                            </div>
                        </div>
				        
                        <div class="form-actions text-right">
                        	<input type="submit" value="Editar" class="btn btn-primary">
                        </div>

				    </div>
				</div>
			</form>
		<!-- Fin del Formulario -->
		<!-- /Contenido Principal-->
{% endblock contenido%}
